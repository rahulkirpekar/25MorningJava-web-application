<!DOCTYPE html>
<html>
<head>
<title>Search</title>

<style>
body {
	margin: 0;
	padding: 0;
	font-family: Arial, sans-serif;
	background: #ffffff;
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
}

.container {
	text-align: center;
}

.logo {
	font-size: 48px;
	font-weight: bold;
	color: #4285F4;
	margin-bottom: 25px;
}

.search-box {
	width: 500px;
	padding: 12px 20px;
	border-radius: 30px;
	border: 1px solid #dcdcdc;
	outline: none;
	font-size: 16px;
	box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

.search-box:focus {
	box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
}

.buttons {
	margin-top: 20px;
}

button {
	padding: 10px 18px;
	border: none;
	background: #f8f9fa;
	margin: 5px;
	font-size: 14px;
	border-radius: 4px;
	cursor: pointer;
}

button:hover {
	border: 1px solid #c6c6c6;
}
</style>

</head>

<body>

	<div class="container">

		<div class="logo">Search</div>

		<form action="SearchServlet" method="get">

			<input type="text" name="query" class="search-box"
				placeholder="Search anything..." required>

			<div class="buttons">
				<button type="submit">Search</button>
				<button type="reset">Clear</button>
			</div>

		</form>

	</div>

</body>
</html>
